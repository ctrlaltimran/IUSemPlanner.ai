<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>coursemap — smart university scheduling</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #fff;
      --bg-subtle: #fafafa;
      --bg-panel: #f5f5f5;
      --bg-hover: #f1f5f9;
      --border: #e5e7eb;
      --border-strong: #d1d5db;
      --text: #0a0a0a;
      --text-muted: #525252;
      --text-faint: #9ca3af;
      --accent: #059669;
      --accent-dark: #047857;
      --accent-bg: #ecfdf5;
      --danger: #dc2626;
      --danger-bg: #fef2f2;
      --warning: #d97706;
      --warning-bg: #fffbeb;
      --info: #2563eb;
      --info-bg: #eff6ff;
      --purple: #7c3aed;
      --purple-bg: #f5f3ff;
      --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', monospace;
      --font-sans: 'Manrope', system-ui, -apple-system, sans-serif;
      --radius: 12px;
      --radius-sm: 8px;
      --radius-lg: 16px;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, .04);
      --shadow: 0 4px 12px rgba(0, 0, 0, .05);
      --shadow-lg: 0 20px 40px rgba(0, 0, 0, .1);
    }

    html,
    body {
      font-family: var(--font-sans);
      color: var(--text);
      background: var(--bg);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh
    }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      background: none
    }

    input,
    select,
    textarea {
      font-family: inherit
    }

    /* ───── LOGIN ───── */
    .login {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image: radial-gradient(circle at 1px 1px, #e2e8f0 1px, transparent 0);
      background-size: 24px 24px
    }

    .login-wrap {
      width: 100%;
      max-width: 1100px
    }

    .login-brand {
      text-align: center;
      margin-bottom: 40px
    }

    .login-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--bg);
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 24px
    }

    .login-pill::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .5
      }
    }

    .login-title {
      font-size: clamp(40px, 7vw, 68px);
      font-weight: 800;
      letter-spacing: -.03em;
      margin-bottom: 12px
    }

    .login-title .dollar {
      color: var(--accent);
      font-family: var(--font-mono);
      font-weight: 700
    }

    .login-sub {
      font-size: 18px;
      color: var(--text-muted);
      max-width: 560px;
      margin: 0 auto
    }

    .login-cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-bottom: 48px
    }

    @media (max-width:768px) {
      .login-cards {
        grid-template-columns: 1fr
      }
    }

    .plan-card {
      text-align: left;
      padding: 32px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      transition: all .2s ease;
      cursor: pointer;
      width: 100%
    }

    .plan-card:hover {
      border-color: var(--text);
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px)
    }

    .plan-card.pro {
      background: #0f172a;
      color: #fff;
      border-color: #0f172a;
      position: relative;
      overflow: hidden
    }

    .plan-card.pro::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -30%;
      width: 60%;
      height: 100%;
      background: radial-gradient(circle, rgba(5, 150, 105, .2), transparent 70%)
    }

    .plan-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      position: relative
    }

    .plan-tag {
      font-family: var(--font-mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .1em;
      padding: 4px 8px;
      border-radius: 4px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      color: var(--text-muted)
    }

    .plan-card.pro .plan-tag {
      background: rgba(5, 150, 105, .1);
      border-color: rgba(5, 150, 105, .3);
      color: #34d399
    }

    .plan-name {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      position: relative
    }

    .plan-desc {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 24px;
      position: relative
    }

    .plan-card.pro .plan-desc {
      color: #cbd5e1
    }

    .plan-features {
      list-style: none;
      font-family: var(--font-mono);
      font-size: 13px;
      position: relative
    }

    .plan-features li {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0
    }

    .plan-features .check {
      color: var(--accent);
      flex-shrink: 0
    }

    .plan-card.pro .plan-features .check {
      color: #34d399
    }

    .plan-card.pro .plan-features .spark {
      color: #34d399
    }

    .plan-features .locked {
      color: var(--text-faint)
    }

    .plan-cta {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 24px;
      font-size: 14px;
      font-weight: 500;
      position: relative;
      transition: gap .2s
    }

    .plan-card:hover .plan-cta {
      gap: 8px
    }

    /* Feature showcase below login cards */
    .features-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 40px
    }

    @media (max-width:768px) {
      .features-row {
        grid-template-columns: repeat(2, 1fr)
      }
    }

    .feature-card {
      padding: 20px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: all .2s
    }

    .feature-card:hover {
      border-color: var(--text);
      transform: translateY(-2px)
    }

    .feature-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--bg-subtle);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      color: var(--text)
    }

    .feature-icon svg {
      width: 18px;
      height: 18px
    }

    .feature-title {
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 4px
    }

    .feature-desc {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5
    }

    /* Animated demo schedule preview */
    .demo-preview {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 32px;
      overflow: hidden
    }

    .demo-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px
    }

    .demo-tag {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .1em
    }

    .demo-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      position: relative;
      height: 160px
    }

    .demo-col {
      position: relative;
      background: var(--bg-subtle);
      border-radius: 6px
    }

    .demo-col::after {
      content: attr(data-label);
      position: absolute;
      top: -18px;
      left: 0;
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-faint)
    }

    .demo-block {
      position: absolute;
      left: 4px;
      right: 4px;
      border-radius: 4px;
      padding: 4px 6px;
      font-size: 9px;
      font-family: var(--font-mono);
      font-weight: 600;
      animation: fadein .8s ease both;
      border-left: 3px solid;
      overflow: hidden
    }

    .demo-block.b-em {
      background: #ecfdf5;
      color: #065f46;
      border-color: #10b981;
      animation-delay: .1s
    }

    .demo-block.b-bl {
      background: #eff6ff;
      color: #1e40af;
      border-color: #3b82f6;
      animation-delay: .3s
    }

    .demo-block.b-am {
      background: #fffbeb;
      color: #92400e;
      border-color: #f59e0b;
      animation-delay: .5s
    }

    .demo-block.b-vi {
      background: #f5f3ff;
      color: #5b21b6;
      border-color: #8b5cf6;
      animation-delay: .7s
    }

    .demo-block.b-rs {
      background: #fff1f2;
      color: #9f1239;
      border-color: #f43f5e;
      animation-delay: .9s
    }

    @keyframes fadein {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .demo-conflict {
      position: absolute;
      top: 0;
      right: 0;
      background: #dc2626;
      color: #fff;
      font-size: 8px;
      padding: 1px 4px;
      border-radius: 0 4px 0 4px;
      font-weight: 700;
      animation: fadein 1s 1.2s both
    }

    .login-footer {
      text-align: center;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-faint);
      margin-top: 24px
    }

    /* ───── HEADER ───── */
    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(255, 255, 255, .85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border)
    }

    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px
    }

    .brand-mark {
      font-family: var(--font-mono);
      color: var(--accent);
      font-weight: 700;
      font-size: 18px
    }

    .brand-name {
      font-weight: 700;
      letter-spacing: -.02em
    }

    .brand-meta {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      margin-left: 8px;
      padding: 4px 8px;
      background: var(--bg-subtle);
      border-radius: 4px;
      border: 1px solid var(--border)
    }

    @media (max-width:640px) {
      .brand-meta {
        display: none
      }
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .plan-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      font-family: var(--font-mono);
      font-size: 11px
    }

    .plan-pill.free {
      background: var(--bg-subtle);
      color: var(--text);
      border: 1px solid var(--border)
    }

    .plan-pill.pro {
      background: #0f172a;
      color: #34d399
    }

    .icon-btn-hdr {
      padding: 6px;
      color: var(--text-muted);
      border-radius: 6px;
      transition: all .2s;
      display: flex;
      align-items: center
    }

    .icon-btn-hdr:hover {
      color: var(--text);
      background: var(--bg-subtle)
    }

    /* ───── TABS ───── */
    .tabs {
      background: var(--bg);
      border-bottom: 1px solid var(--border)
    }

    .tabs-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 4px;
      overflow-x: auto
    }

    .tab {
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      transition: color .2s;
      white-space: nowrap
    }

    .tab:hover {
      color: var(--text)
    }

    .tab.active {
      color: var(--text)
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--text)
    }

    .tab .pro-badge {
      font-family: var(--font-mono);
      font-size: 9px;
      padding: 2px 6px;
      background: var(--accent-bg);
      color: var(--accent-dark);
      border-radius: 4px;
      border: 1px solid #a7f3d0;
      letter-spacing: .05em
    }

    .tab svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0
    }

    .tab .count-badge {
      font-family: var(--font-mono);
      font-size: 9px;
      padding: 1px 6px;
      background: var(--text);
      color: #fff;
      border-radius: 999px
    }

    /* ───── LAYOUT ───── */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 32px 24px
    }

    .page-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 32px
    }

    .page-title {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -.02em;
      margin-bottom: 4px
    }

    .page-sub {
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 13px
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap
    }

    /* ───── BUTTONS ───── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 500;
      border-radius: var(--radius-sm);
      transition: all .15s;
      border: 1px solid transparent
    }

    .btn svg {
      width: 16px;
      height: 16px
    }

    .btn-primary {
      background: var(--text);
      color: #fff
    }

    .btn-primary:hover {
      background: #262626
    }

    .btn-secondary {
      background: var(--bg);
      color: var(--text);
      border-color: var(--border-strong)
    }

    .btn-secondary:hover {
      background: var(--bg-subtle)
    }

    .btn-ghost {
      color: var(--text-muted)
    }

    .btn-ghost:hover {
      color: var(--text);
      background: var(--bg-subtle)
    }

    .btn-accent {
      background: var(--accent);
      color: #fff
    }

    .btn-accent:hover {
      background: var(--accent-dark)
    }

    .btn-danger {
      background: var(--danger);
      color: #fff
    }

    .btn-danger:hover {
      background: #b91c1c
    }

    .btn:disabled {
      opacity: .5;
      cursor: not-allowed
    }

    .btn-sm {
      padding: 5px 10px;
      font-size: 12px
    }

    /* ───── STATUS DOTS / BADGES ───── */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: .05em;
      font-weight: 600
    }

    .status-completed {
      background: var(--accent-bg);
      color: var(--accent-dark);
      border: 1px solid #a7f3d0
    }

    .status-inProgress {
      background: var(--info-bg);
      color: #1e40af;
      border: 1px solid #bfdbfe
    }

    .status-available {
      background: var(--warning-bg);
      color: #92400e;
      border: 1px solid #fcd34d
    }

    .status-locked {
      background: var(--danger-bg);
      color: #991b1b;
      border: 1px solid #fecaca
    }

    .status-notOffered {
      background: var(--bg-subtle);
      color: var(--text-muted);
      border: 1px solid var(--border)
    }

    .status-elective {
      background: var(--purple-bg);
      color: var(--purple);
      border: 1px solid #ddd6fe
    }

    .dot-completed {
      background: var(--accent)
    }

    .dot-inProgress {
      background: var(--info)
    }

    .dot-available {
      background: var(--warning)
    }

    .dot-locked {
      background: var(--danger)
    }

    .dot-notOffered {
      background: var(--text-faint)
    }

    .dot-elective {
      background: var(--purple)
    }

    /* ───── EMPTY ───── */
    .empty {
      border: 2px dashed var(--border);
      border-radius: var(--radius-lg);
      padding: 64px 32px;
      text-align: center;
      background: var(--bg-subtle)
    }

    .empty-comment {
      font-family: var(--font-mono);
      color: var(--text-faint);
      font-size: 14px;
      margin-bottom: 8px
    }

    .empty-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -.01em
    }

    .empty-text {
      color: var(--text-muted);
      margin: 0 auto 32px;
      max-width: 480px
    }

    .empty-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap
    }

    /* ───── PROGRESS TAB ───── */
    .progress-hero {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 24px;
      margin-bottom: 32px
    }

    @media (max-width:768px) {
      .progress-hero {
        grid-template-columns: 1fr
      }
    }

    .ring-card {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      border-radius: var(--radius-lg);
      padding: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden
    }

    .ring-card::before {
      content: '';
      position: absolute;
      top: -30%;
      right: -30%;
      width: 60%;
      height: 100%;
      background: radial-gradient(circle, rgba(5, 150, 105, .2), transparent 70%)
    }

    .ring {
      position: relative;
      width: 200px;
      height: 200px
    }

    .ring svg {
      transform: rotate(-90deg)
    }

    .ring-text {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center
    }

    .ring-pct {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -.03em
    }

    .ring-sub {
      font-family: var(--font-mono);
      font-size: 11px;
      opacity: .7;
      margin-top: 4px
    }

    .ring-foot {
      font-family: var(--font-mono);
      font-size: 11px;
      opacity: .7;
      margin-top: 16px;
      text-align: center
    }

    .progress-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px
    }

    .big-stat {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px
    }

    .big-stat .label {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: .08em
    }

    .big-stat .value {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -.02em;
      line-height: 1
    }

    .big-stat .value .suffix {
      font-size: 14px;
      font-family: var(--font-mono);
      color: var(--text-faint);
      font-weight: 500;
      margin-left: 4px
    }

    .big-stat .hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px
    }

    .big-stat.accent {
      background: var(--accent-bg);
      border-color: #a7f3d0
    }

    .big-stat.accent .value {
      color: var(--accent-dark)
    }

    .big-stat.info {
      background: var(--info-bg);
      border-color: #bfdbfe
    }

    .big-stat.info .value {
      color: #1e40af
    }

    .big-stat.warn {
      background: var(--warning-bg);
      border-color: #fcd34d
    }

    .big-stat.warn .value {
      color: #92400e
    }

    .semester-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 24px
    }

    @media (max-width:768px) {
      .semester-grid {
        grid-template-columns: 1fr
      }
    }

    .sem-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px
    }

    .sem-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px
    }

    .sem-name {
      font-weight: 700;
      font-size: 15px
    }

    .sem-meta {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted)
    }

    .sem-progress {
      height: 6px;
      background: var(--bg-panel);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 16px
    }

    .sem-progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width .4s
    }

    .sem-courses {
      display: flex;
      flex-direction: column;
      gap: 6px
    }

    .sem-course {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 6px;
      font-size: 12px
    }

    .sem-course-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .sem-course-code {
      font-family: var(--font-mono);
      color: var(--text-muted);
      font-size: 11px;
      min-width: 70px
    }

    .sem-course-name {
      flex: 1;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .sem-course-grade {
      font-family: var(--font-mono);
      font-weight: 600;
      font-size: 11px
    }

    /* ───── CATALOG ───── */
    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border)
    }

    .filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-muted);
      transition: all .15s
    }

    .filter-chip:hover {
      color: var(--text);
      border-color: var(--border-strong)
    }

    .filter-chip.active {
      background: var(--text);
      color: #fff;
      border-color: var(--text)
    }

    .filter-chip .count {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 1px 6px;
      background: var(--bg-subtle);
      color: var(--text-muted);
      border-radius: 999px
    }

    .filter-chip.active .count {
      background: rgba(255, 255, 255, .2);
      color: #fff
    }

    .search-input {
      width: 100%;
      padding: 10px 14px;
      font-size: 14px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      outline: none;
      margin-bottom: 16px;
      background: var(--bg)
    }

    .search-input:focus {
      border-color: var(--text)
    }

    .catalog-list {
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .catalog-row {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: grid;
      grid-template-columns: 100px 1fr auto;
      gap: 16px;
      align-items: center;
      transition: all .15s
    }

    .catalog-row:hover {
      border-color: var(--border-strong);
      box-shadow: var(--shadow-sm)
    }

    .cat-code {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-muted)
    }

    .cat-main {
      min-width: 0
    }

    .cat-name {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 4px
    }

    .cat-meta {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-faint);
      display: flex;
      gap: 12px;
      flex-wrap: wrap
    }

    .cat-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end
    }

    .grade-pill {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 6px;
      background: var(--accent-bg);
      color: var(--accent-dark)
    }

    @media (max-width:640px) {
      .catalog-row {
        grid-template-columns: 1fr;
        gap: 8px
      }

      .cat-right {
        justify-content: flex-start
      }
    }

    /* ───── MODAL ───── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, .4);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 100;
      animation: bdfade .15s ease
    }

    @keyframes bdfade {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    .modal {
      background: var(--bg);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      animation: modalpop .2s ease
    }

    @keyframes modalpop {
      from {
        opacity: 0;
        transform: scale(.95)
      }

      to {
        opacity: 1;
        transform: scale(1)
      }
    }

    .modal.wide {
      max-width: 780px
    }

    .modal-head {
      position: sticky;
      top: 0;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 1
    }

    .modal-title {
      font-weight: 700
    }

    .modal-body {
      padding: 24px
    }

    .modal .row {
      display: grid;
      gap: 12px;
      margin-bottom: 12px
    }

    .modal .row.two {
      grid-template-columns: 1fr 1fr
    }

    .modal label {
      display: block;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px
    }

    .field {
      width: 100%;
      padding: 8px 12px;
      font-size: 14px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      outline: none;
      background: var(--bg)
    }

    .field:focus {
      border-color: var(--text)
    }

    .field-mono {
      font-family: var(--font-mono);
      font-size: 13px
    }

    textarea.field {
      resize: vertical;
      min-height: 220px;
      line-height: 1.5
    }

    .sessions-list {
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .session-edit {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      background: var(--bg-subtle);
      border-radius: var(--radius-sm)
    }

    .session-edit select,
    .session-edit input {
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 4px 8px;
      background: var(--bg);
      border: 1px solid var(--border-strong);
      border-radius: 4px;
      outline: none
    }

    .session-edit input[type=time] {
      flex: 1;
      min-width: 0
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding-top: 12px;
      margin-top: 16px;
      border-top: 1px solid var(--border)
    }

    .note {
      background: var(--bg-subtle);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      margin-bottom: 16px
    }

    .note-tag {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px
    }

    .note p {
      font-size: 14px
    }

    .note ul {
      margin: 6px 0 0 16px;
      font-size: 13px;
      color: var(--text-muted)
    }

    /* ───── PLANNER ───── */
    .planner-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px
    }

    @media (max-width:900px) {
      .planner-grid {
        grid-template-columns: 1fr
      }
    }

    .planner-panel {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden
    }

    .planner-panel-head {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .planner-panel-title {
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .planner-panel-title .step {
      width: 20px;
      height: 20px;
      background: var(--text);
      color: #fff;
      font-family: var(--font-mono);
      font-size: 11px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700
    }

    .planner-panel-meta {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted)
    }

    .planner-panel-body {
      padding: 0;
      max-height: 520px;
      overflow-y: auto
    }

    .avail-group {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border)
    }

    .avail-group:last-child {
      border-bottom: none
    }

    .avail-group-head {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between
    }

    .avail-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #f3f4f6
    }

    .avail-row:last-child {
      border-bottom: none
    }

    .avail-info {
      flex: 1;
      min-width: 0
    }

    .avail-code {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 2px
    }

    .avail-name {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.3
    }

    .avail-meta {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-faint);
      margin-top: 2px
    }

    .avail-action {
      flex-shrink: 0
    }

    .avail-row.locked {
      opacity: .6
    }

    .avail-row.added .avail-action {
      color: var(--accent)
    }

    .plan-item {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border)
    }

    .plan-item:last-child {
      border-bottom: none
    }

    .plan-item-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px
    }

    .plan-item-info {
      flex: 1;
      min-width: 0
    }

    .plan-item-code {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted)
    }

    .plan-item-name {
      font-weight: 600;
      font-size: 13px;
      line-height: 1.3;
      margin-top: 2px
    }

    .plan-item-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap
    }

    .plan-item-sessions {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 8px
    }

    .plan-mini-sess {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      background: var(--bg-subtle);
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 11px
    }

    .plan-mini-sess select,
    .plan-mini-sess input {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 2px 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      outline: none
    }

    .plan-mini-sess input[type=time] {
      width: auto
    }

    .plan-mini-sess .x {
      margin-left: auto;
      color: var(--text-faint);
      cursor: pointer;
      font-size: 14px
    }

    .plan-mini-sess .x:hover {
      color: var(--danger)
    }

    .add-mini {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 0;
      display: inline-flex;
      align-items: center;
      gap: 4px
    }

    .add-mini:hover {
      color: var(--text)
    }

    .diff-mini {
      font-size: 10px;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid var(--border);
      cursor: pointer;
      outline: none
    }

    .diff-easy {
      background: var(--accent-bg);
      color: #065f46;
      border-color: #a7f3d0
    }

    .diff-medium {
      background: var(--info-bg);
      color: #1e40af;
      border-color: #bfdbfe
    }

    .diff-hard {
      background: var(--warning-bg);
      color: #92400e;
      border-color: #fcd34d
    }

    .diff-brutal {
      background: var(--danger-bg);
      color: #991b1b;
      border-color: #fecaca
    }

    /* ───── ANALYSIS ───── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 24px
    }

    .stat-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px
    }

    .stat-card.accent {
      background: var(--accent-bg);
      border-color: #a7f3d0
    }

    .stat-card.info {
      background: var(--info-bg);
      border-color: #bfdbfe
    }

    .stat-card.warn {
      background: var(--warning-bg);
      border-color: #fcd34d
    }

    .stat-card.danger {
      background: var(--danger-bg);
      border-color: #fecaca
    }

    .stat-label {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 6px
    }

    .stat-value {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -.02em;
      line-height: 1
    }

    .stat-value.danger {
      color: var(--danger)
    }

    .stat-value .suffix {
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--text-faint);
      font-weight: 500;
      margin-left: 4px
    }

    .stat-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px
    }

    .panel {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 8px
    }

    .panel-title {
      font-weight: 700;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .panel-meta {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted)
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 0
    }

    .bar-day {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      width: 40px
    }

    .bar-track {
      flex: 1;
      height: 32px;
      background: var(--bg-subtle);
      border-radius: 6px;
      overflow: hidden;
      position: relative
    }

    .bar-fill {
      height: 100%;
      transition: width .4s
    }

    .bar-empty {
      background: var(--bg-panel)
    }

    .bar-low {
      background: var(--accent)
    }

    .bar-mid {
      background: var(--warning)
    }

    .bar-high {
      background: var(--danger)
    }

    .bar-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 12px;
      font-weight: 500
    }

    .bar-label.on-fill {
      color: #fff;
      text-shadow: 0 1px 2px rgba(0, 0, 0, .2)
    }

    .bar-label.empty {
      color: var(--text-faint)
    }

    .alert {
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
      display: flex;
      gap: 12px;
      align-items: flex-start
    }

    .alert-danger {
      background: var(--danger-bg);
      border: 1px solid #fecaca;
      color: #7f1d1d
    }

    .alert-warn {
      background: var(--warning-bg);
      border: 1px solid #fcd34d;
      color: #78350f
    }

    .alert-info {
      background: var(--info-bg);
      border: 1px solid #bfdbfe;
      color: #1e40af
    }

    .alert-success {
      background: var(--accent-bg);
      border: 1px solid #a7f3d0;
      color: #065f46
    }

    .alert svg {
      flex-shrink: 0;
      width: 20px;
      height: 20px
    }

    .alert-title {
      font-weight: 600;
      margin-bottom: 4px
    }

    .alert-body {
      font-size: 13px
    }

    /* ───── REC LIST ───── */
    .rec-list {
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .rec-item {
      display: flex;
      gap: 12px;
      padding: 12px;
      border-radius: var(--radius-sm);
      background: var(--bg-subtle);
      border: 1px solid var(--border)
    }

    .rec-item.success {
      background: var(--accent-bg);
      border-color: #a7f3d0
    }

    .rec-item.warn {
      background: var(--warning-bg);
      border-color: #fcd34d
    }

    .rec-item.danger {
      background: var(--danger-bg);
      border-color: #fecaca
    }

    .rec-item.info {
      background: var(--info-bg);
      border-color: #bfdbfe
    }

    .rec-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: rgba(0, 0, 0, .04)
    }

    .rec-icon svg {
      width: 14px;
      height: 14px
    }

    .rec-text {
      flex: 1;
      font-size: 13px;
      line-height: 1.5
    }

    .rec-text strong {
      font-weight: 700
    }

    /* ───── TIMETABLE ───── */
    .timetable {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden
    }

    .tt-header,
    .tt-body {
      display: grid;
      grid-template-columns: 64px repeat(5, 1fr)
    }

    .tt-header {
      background: var(--bg-subtle);
      border-bottom: 1px solid var(--border)
    }

    .tt-header>div {
      padding: 10px;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      border-right: 1px solid var(--border)
    }

    .tt-header>div:last-child {
      border-right: none
    }

    .tt-time {
      border-right: 1px solid var(--border)
    }

    .tt-time .hour {
      height: 60px;
      border-bottom: 1px solid #f1f5f9;
      padding: 2px 8px 0 0;
      text-align: right;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-faint)
    }

    .tt-day {
      position: relative;
      border-right: 1px solid var(--border)
    }

    .tt-day:last-child {
      border-right: none
    }

    .tt-day .slot {
      height: 60px;
      border-bottom: 1px solid #f1f5f9
    }

    .tt-block {
      position: absolute;
      left: 4px;
      right: 4px;
      border-radius: 6px;
      padding: 6px 8px;
      cursor: pointer;
      transition: box-shadow .15s;
      border-left: 4px solid var(--c);
      background: var(--c-bg);
      overflow: hidden
    }

    .tt-block:hover {
      box-shadow: var(--shadow)
    }

    .tt-block.conflict {
      outline: 2px solid var(--danger);
      outline-offset: 1px;
      animation: conflict-pulse 2s ease-in-out infinite
    }

    @keyframes conflict-pulse {

      0%,
      100% {
        outline-color: var(--danger)
      }

      50% {
        outline-color: rgba(220, 38, 38, .4)
      }
    }

    .tt-block .b-code {
      font-family: var(--font-mono);
      font-size: 9px;
      opacity: .7;
      color: var(--c-text)
    }

    .tt-block .b-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--c-text);
      line-height: 1.2;
      margin-top: 2px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden
    }

    .tt-block .b-time {
      font-family: var(--font-mono);
      font-size: 9px;
      opacity: .6;
      margin-top: 4px;
      color: var(--c-text)
    }

    .c-0 {
      --c: #10b981;
      --c-bg: #ecfdf5;
      --c-text: #065f46
    }

    .c-1 {
      --c: #3b82f6;
      --c-bg: #eff6ff;
      --c-text: #1e40af
    }

    .c-2 {
      --c: #8b5cf6;
      --c-bg: #f5f3ff;
      --c-text: #5b21b6
    }

    .c-3 {
      --c: #f59e0b;

    .upgrade-card {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      border-radius: var(--radius-lg);
      padding: 48px;
      position: relative;
      overflow: hidden;
      max-width: 720px;
      margin: 0 auto
    }

    .upgrade-card::before {
      content: '';
      position: absolute;
      top: -40%;
      right: -20%;
      width: 60%;
      height: 100%;
      background: radial-gradient(circle, rgba(5, 150, 105, .25), transparent 70%)
    }

    .upgrade-card .lock-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(5, 150, 105, .15);
      border: 1px solid rgba(5, 150, 105, .4);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      color: #34d399;
      position: relative
    }

    .upgrade-card h2 {
      font-size: 32px;
      letter-spacing: -.02em;
      margin-bottom: 12px;
      position: relative
    }

    .upgrade-card p {
      color: #cbd5e1;
      margin-bottom: 24px;
      position: relative;
      max-width: 480px
    }

    .upgrade-features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 32px;
      position: relative
    }

    .upgrade-features div {
      font-family: var(--font-mono);
      font-size: 13px;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .upgrade-features div::before {
      content: '✓';
      color: #34d399
    }

    .ai-panel {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px
    }

    .ai-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px
    }

    .ai-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700
    }

    .ai-title svg {
      color: var(--accent)
    }

    .ai-content {
      font-size: 14px;
      color: var(--text);
      line-height: 1.7;
      white-space: pre-wrap
    }

    .ai-placeholder {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-faint);
      padding: 24px;
      background: var(--bg-subtle);
      border-radius: var(--radius-sm);
      border: 1px dashed var(--border);
      text-align: center
    }

    .ai-loading {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: var(--bg-subtle);
      border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-muted)
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .ai-error {
      padding: 12px;
      background: var(--danger-bg);
      border: 1px solid #fecaca;
      color: #7f1d1d;
      border-radius: var(--radius-sm);
      font-size: 13px
    }

    .muted {
      color: var(--text-muted)
    }

    .mono {
      font-family: var(--font-mono)
    }

    .accent {
      color: var(--accent)
    }

    .danger {

    }

        const semM = line.match(/^Semester\s*-\s*(\d+)/i);
        if (semM) { currentSemester = parseInt(semM[1]); inElectives = false; continue; }
        if (/^Electives/i.test(line)) { currentSemester = null; inElectives = true; continue; }

        // Identify status
        let status = null;
        if (line.includes('Already cleared')) status = 'completed';
        else if (line.includes('In Progress')) status = 'inProgress';
        else if (line.includes('Pre Requisite not cleared')) status = 'locked';
        else if (line.includes('Refer below for Electives')) status = 'elective';
        else if (line.includes('Course not Offered')) status = 'notOffered';
        else continue;

        // Tokenise
        let tokens = line.split('\t').map(t => t.trim()).filter(t => t !== '');
        if (tokens.length < 4) tokens = line.split(/\s{2,}|\t/).map(t => t.trim()).filter(Boolean);

        // Find code (first token matching course code pattern)
        let code = '', codeIdx = -1;
        for (let i = 0; i < tokens.length; i++) {
          if (/^(ELECT\d|[A-Z]{2,5}[-\s]?\d{2,4}(?:-L)?)$/i.test(tokens[i])) {
            code = tokens[i].toUpperCase().replace(/\s+/, '-');
            codeIdx = i; break;
          }
        }
        if (!code) continue;

        // Prereq (next token, "-" or another code)
        let prereq = '';
        if (codeIdx + 1 < tokens.length) {
          const t = tokens[codeIdx + 1];
          if (t === '-') prereq = '';
          else if (/^[A-Z]{2,5}[-\s]?\d{2,4}(?:-L)?$/i.test(t)) prereq = t.toUpperCase().replace(/\s+/, '-');
        }

        // Credit hours — first single digit number after code
        let crIdx = codeIdx + 1, credits = 3;
        while (crIdx < tokens.length && !/^[1-6]$/.test(tokens[crIdx])) crIdx++;
        if (crIdx < tokens.length) credits = parseInt(tokens[crIdx]);

        // Name + grade
        let nameTokens = [], grade = null;
        for (let i = crIdx + 1; i < tokens.length; i++) {
          const t = tokens[i];
          if (GRADES.includes(t.toUpperCase())) { grade = t.toUpperCase(); break; }
          if (t === 'To be taken') break;
          if (STATUS_KEYWORDS.some(k => t === k || t.startsWith(k))) break;
          nameTokens.push(t);
        }
        const name = nameTokens.join(' ').replace(/\s+/g, ' ').trim() || code;
        const isLab = /\(LAB\)/i.test(name) || /-L$/.test(code);
        const isElective = inElectives || /\(DE\)/i.test(name) || /^ELECT\d$/i.test(code);

        courses.push({
          id: uid(),
          code, name, prereq, credits,
          grade, status, semester: currentSemester,
          isLab, isElective,
          colorIdx: courses.length % 8,
          difficulty: 'medium',
          sessions: [],
          planned: false,    // user-selected for current semester planning
        });
      }
      return courses;
    }

    /* ════════════════════════════════════════════════════════════
       ANALYTICS
       ════════════════════════════════════════════════════════════ */
    function computeStats(courses) {
      const byStatus = { completed: [], inProgress: [], available: [], locked: [], notOffered: [], elective: [] };
      for (const c of courses) (byStatus[c.status] || []).push(c);

      const completedCredits = byStatus.completed.reduce((s, c) => s + c.credits, 0);
      const inProgressCredits = byStatus.inProgress.reduce((s, c) => s + c.credits, 0);
      const remainingCredits = Math.max(0, TOTAL_CREDITS - completedCredits - inProgressCredits);

      // GPA — credit-hour-weighted average
      let totalPoints = 0, totalCr = 0;
      for (const c of byStatus.completed) {
        if (c.grade && GRADE_POINTS[c.grade] != null) {
          totalPoints += GRADE_POINTS[c.grade] * c.credits;
          totalCr += c.credits;
        }
      }
      const gpa = totalCr > 0 ? (totalPoints / totalCr).toFixed(2) : null;

      const electivesCompleted = byStatus.completed.filter(c => c.isElective).length;
      const completedSet = new Set(byStatus.completed.map(c => c.code));

      return {
        byStatus, completedCredits, inProgressCredits, remainingCredits,
        pctComplete: Math.round((completedCredits / TOTAL_CREDITS) * 100),
        gpa, electivesCompleted, electivesNeeded: 5, completedSet,
      };
    }

    function prereqMet(course, completedSet) {
      if (!course.prereq) return true;
      return completedSet.has(course.prereq);
    }

    /* Schedule-only analytics — works on a given list of courses with sessions */
    function detectConflicts(items) {
      // items = [{course, session, day}]
      const conflicts = [];
      for (let i = 0; i < items.length; i++) {
        for (let j = i + 1; j < items.length; j++) {
          const a = items[i], b = items[j];
          if (a.day !== b.day) continue;
          if (a.course.id === b.course.id) continue;
          const a1 = toMin(a.session.start), a2 = toMin(a.session.end);
          const b1 = toMin(b.session.start), b2 = toMin(b.session.end);
          if (a1 < b2 && b1 < a2) {
            conflicts.push({ a: a.course, b: b.course, day: a.day, overlap: Math.min(a2, b2) - Math.max(a1, b1) });
          }
        }
      }
      return conflicts;
    }

    function planItems(courses) {
      // returns flat list of {course, session, day} for planned/scheduled courses
      const items = [];
      for (const c of courses) {
        if (!c.planned) continue;
        for (const s of c.sessions) items.push({ course: c, session: s, day: s.day });
      }
      return items;
    }

    function dailyLoad(items) {
      const load = {};
      for (const d of DAYS) load[d.key] = { courses: new Set(), sessions: 0, minutes: 0, list: [] };
      for (const it of items) {
        load[it.day].courses.add(it.course.id);
        load[it.day].sessions += 1;
        load[it.day].minutes += toMin(it.session.end) - toMin(it.session.start);
        load[it.day].list.push(it);
      }
      for (const d of DAYS) load[d.key].list.sort((x, y) => toMin(x.session.start) - toMin(y.session.start));
      return load;
    }

    function findGaps(items) {
      const load = dailyLoad(items);
      const gaps = [];
      for (const d of DAYS) {
        const list = load[d.key].list;
        for (let i = 0; i < list.length - 1; i++) {
          const gap = toMin(list[i + 1].session.start) - toMin(list[i].session.end);
          if (gap >= 60) gaps.push({
            day: d.key, after: list[i].course, before: list[i + 1].course,
            start: list[i].session.end, end: list[i + 1].session.start, minutes: gap
          });
        }
      }
      return gaps;
    }

    function findTraps(items) {
      const load = dailyLoad(items);
      const traps = [];
      for (const d of DAYS) {
        const list = load[d.key].list;
        if (list.length < 2) continue;
        const first = toMin(list[0].session.start);
        const last = toMin(list[list.length - 1].session.end);
        if (first <= 10 * 60 && last >= 16 * 60 && (last - first) >= 7 * 60) {
          traps.push({ day: d.key, first: list[0], last: list[list.length - 1], span: last - first });
        }
      }
      return traps;
    }

    function hasLunchBreak(items) {
      // returns array of days where 12-1pm slot is occupied
      const load = dailyLoad(items);
      const violations = [];
      for (const d of DAYS) {
        if (load[d.key].sessions === 0) continue;
        for (const it of load[d.key].list) {
          const s = toMin(it.session.start), e = toMin(it.session.end);
          // overlaps 12:00-13:00
          if (s < 13 * 60 && e > 12 * 60) {
            violations.push({ day: d.key, course: it.course });
            break;
          }
        }
      }
      return violations;
    }

    function emptyDays(items) {
      const load = dailyLoad(items);
      return DAYS.filter(d => load[d.key].sessions === 0);
    }

    function balanceScore(items) {
      if (items.length === 0) return null;
      const load = dailyLoad(items);
      const sessCounts = DAYS.map(d => load[d.key].sessions);
      const minutes = DAYS.map(d => load[d.key].minutes);
      const maxS = Math.max(...sessCounts), minS = Math.min(...sessCounts);
      const maxM = Math.max(...minutes);
      const conflicts = detectConflicts(items).length;
      const traps = findTraps(items).length;
      const totalGapMin = findGaps(items).reduce((s, g) => s + g.minutes, 0);
      const lunch = hasLunchBreak(items).length;
      const empty = emptyDays(items).length;

      let score = 100;
      score -= conflicts * 25;
      score -= Math.max(0, (maxS - minS - 1)) * 4;        // some unevenness is OK
      if (maxM > 5 * 60) score -= (maxM - 5 * 60) / 8;        // overloaded day
      score -= traps * 12;
      score -= Math.min(totalGapMin / 40, 15);            // dead time penalty (gentler)
      score -= lunch * 3;                                 // mild penalty per day with no lunch
      if (empty === 0) score -= 5;                        // every day has class → no rest day
      score = Math.max(0, Math.round(score));

      // Difficulty balance — spread of weighted mental load across active days
      const diffByDay = {}; for (const d of DAYS) diffByDay[d.key] = 0;
      for (const it of items) diffByDay[it.day] += DIFFICULTY[it.course.difficulty].weight;
      const activeDays = Object.values(diffByDay).filter(v => v > 0);
      const dSpread = activeDays.length ? Math.max(...activeDays) - Math.min(...activeDays) : 0;
      const difficultyBalance = Math.max(0, 100 - dSpread * 10);

      return { score, difficultyBalance, conflicts, traps, totalGapMin, lunch, empty, diffByDay };
    }

    /* Rule-based recommendations */
    function computeRecommendations(courses) {
      const items = planItems(courses);
      const recs = [];

      if (items.length === 0) {
        recs.push({ tone: 'info', icon: ICON.target, text: '<strong>No plan yet.</strong> Pick courses on the left to start building this semester\'s schedule.' });
        return recs;
      }

      const score = balanceScore(items);
      const load = dailyLoad(items);
      const gaps = findGaps(items);
      const traps = findTraps(items);
      const conflicts = detectConflicts(items);
      const empties = emptyDays(items);
      const lunch = hasLunchBreak(items);

      // CRITICAL — conflicts
      if (conflicts.length > 0) {
        for (const c of conflicts.slice(0, 3)) {
          recs.push({
            tone: 'danger', icon: ICON.warning,
            text: `<strong>${esc(c.a.code)} clashes with ${esc(c.b.code)}</strong> on ${DAYS.find(d => d.key === c.day).full} — they overlap by ${fmtDur(c.overlap)}. Move one of them to a different slot.`
          });
        }
      }

      // Overloaded days
      for (const d of DAYS) {
        if (load[d.key].sessions >= 4) {
          const courseList = [...new Set(load[d.key].list.map(it => it.course.code))];
          recs.push({
            tone: 'warn', icon: ICON.zap,
            text: `<strong>${d.full} is overloaded</strong> — ${load[d.key].sessions} sessions back-to-back (${fmtDur(load[d.key].minutes)}). Consider moving one of: ${courseList.join(', ')}.`
          });
        }
      }

      // Dead hours
      if (score.totalGapMin >= 180) {
        const worstGap = gaps.sort((a, b) => b.minutes - a.minutes)[0];
        recs.push({
          tone: 'warn', icon: ICON.coffee,
          text: `<strong>${fmtDur(score.totalGapMin)} of dead time per week.</strong> Longest gap: ${fmtDur(worstGap.minutes)} on ${DAYS.find(d => d.key === worstGap.day).full} between ${esc(worstGap.after.code)} and ${esc(worstGap.before.code)}.`
        });
      }

      // Morning-evening trap
      for (const t of traps) {
        recs.push({
          tone: 'warn', icon: ICON.sun,
          text: `<strong>${DAYS.find(d => d.key === t.day).full} is a long day</strong> — first class at ${fmtTime(t.first.session.start)}, last ends ${fmtTime(t.last.session.end)} (${fmtDur(t.span)} total). Try to compress.`
        });
      }

      // Difficulty stacking
      const hardDays = DAYS.filter(d => score.diffByDay[d.key] >= 7);
      for (const d of hardDays) {
        const hardCourses = load[d.key].list.filter(it => ['hard', 'brutal'].includes(it.course.difficulty));
        if (hardCourses.length >= 2) {
          const codes = [...new Set(hardCourses.map(it => it.course.code))];
          recs.push({
            tone: 'warn', icon: ICON.brain,
            text: `<strong>${d.full} stacks hard courses</strong> — ${codes.join(' + ')} on the same day will be brutal mentally. Spread these out if you can.`
          });
        }
      }

      // Lunch break
      if (lunch.length >= 3) {
        recs.push({
          tone: 'info', icon: ICON.coffee,
          text: `<strong>No lunch break ${lunch.length} days/week.</strong> Classes run through 12-1 PM. Consider leaving that slot open at least 2 days.`
        });
      }

      // Positive: clean schedule
      if (conflicts.length === 0 && score.score >= 80) {
        recs.push({
          tone: 'success', icon: ICON.check,
          text: `<strong>Solid schedule!</strong> Balance score is ${score.score}/100 with no conflicts and clean load distribution.`
        });
      }

      // Positive: free day
      if (empties.length > 0) {
        recs.push({
          tone: 'success', icon: ICON.spark,
          text: `<strong>${empties.map(d => d.full).join(', ')} free</strong> — great for study, work, or rest.`
        });
      }

      // Credit warning
      const totalCr = courses.filter(c => c.planned).reduce((s, c) => s + c.credits, 0);
      if (totalCr > 0 && totalCr < 12) {
        recs.push({
          tone: 'info', icon: ICON.target,
          text: `<strong>Only ${totalCr} credit hours planned.</strong> Most students take 15-18 cr/semester. Consider adding more.`
        });
      }
      if (totalCr > 21) {
        recs.push({
          tone: 'warn', icon: ICON.warning,
          text: `<strong>${totalCr} credit hours is a heavy load.</strong> Be realistic — university limits are often 18-21 cr/sem.`
        });
      }

      return recs;
    }

    /* ════════════════════════════════════════════════════════════
       CLAUDE API  (Pro)
       ════════════════════════════════════════════════════════════ */
    async function callClaude(prompt) {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1200, messages: [{ role: 'user', content: prompt }] }),
      });
      if (!res.ok) throw new Error('API request failed (' + res.status + ')');
      const data = await res.json();
      return (data.content || []).map(b => b.text || '').join('\n').trim();
    }

    function buildContext() {
      const stats = computeStats(state.courses);
      const items = planItems(state.courses);
      const planText = items.length === 0 ? '(no planned courses)' :
        state.courses.filter(c => c.planned).map(c => {
          const days = c.sessions.map(s => DAYS.find(d => d.key === s.day).full + ' ' + s.start + '-' + s.end).join('; ');
          return `${c.code} ${c.name} (${c.credits}cr, ${c.difficulty}): ${days}`;
        }).join('\n');

      return `Student profile (Iqra University, BS Software Engineering):
- Credits completed: ${stats.completedCredits}/${TOTAL_CREDITS} (${stats.pctComplete}%)
- Credits in progress: ${stats.inProgressCredits}
- Credits remaining: ${stats.remainingCredits}
- Current GPA: ${stats.gpa || 'N/A'}
- Electives completed: ${stats.electivesCompleted}/5

Planned courses for current semester:
${planText}`;
    }

    async function generateAISummary() {
      if (state.ai.loadingSummary) return;
      state.ai.loadingSummary = true; state.ai.errorSummary = null; render();
      try {
        const ctx = buildContext();
        const items = planItems(state.courses);
        const score = balanceScore(items);
        const prompt = `You are a university advisor for a BS Software Engineering student at Iqra University. Write a 3-4 sentence personalized summary of their academic progress AND current semester plan. Be specific (mention actual course codes, days). Mention strengths AND issues. Tone: friendly, direct upperclassman. Plain text only.\n\n${ctx}\n${score ? `\nSchedule health: balance ${score.score}/100, ${score.conflicts} conflicts, total dead time ${fmtDur(score.totalGapMin)}.` : ''}`;
        state.ai.summary = await callClaude(prompt);
      } catch (e) { state.ai.errorSummary = e.message || 'Failed to fetch AI summary.'; }
      finally { state.ai.loadingSummary = false; render(); }
    }

    async function generateAIRecommendations() {
      if (state.ai.loadingRecs) return;
      state.ai.loadingRecs = true; state.ai.errorRecs = null; render();
      try {
        const ctx = buildContext();
        const stats = computeStats(state.courses);
        const items = planItems(state.courses);
        const score = balanceScore(items);
        const eligible = state.courses.filter(c => c.status !== 'completed' && c.status !== 'locked' && !c.planned && prereqMet(c, stats.completedSet))
          .slice(0, 15).map(c => c.code + ' ' + c.name).join(', ') || 'none';
        const prompt = `You are a university advisor. Give the student 4-6 SPECIFIC, ACTIONABLE recommendations. Cover academic planning (which courses to take next, electives) AND schedule optimization (gaps, conflicts, load). Reference actual course codes. Format as numbered list (1. 2. 3...). Plain text only.\n\n${ctx}\n\nCourses they could take but haven't planned: ${eligible}\n${score ? `\nSchedule issues: ${score.conflicts} conflicts, ${score.traps} morning-evening traps, ${fmtDur(score.totalGapMin)} dead time, balance ${score.score}/100.` : ''}`;
        state.ai.recommendations = await callClaude(prompt);
      } catch (e) { state.ai.errorRecs = e.message || 'Failed to fetch recommendations.'; }
      finally { state.ai.loadingRecs = false; render(); }
    }
